apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: cc
spec:
  replicas: 1
  selector:
    matchLabels: { app: valkey }
  template:
    metadata:
      labels: { app: valkey }
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:7.2-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 1
            periodSeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: cc
spec:
  selector: { app: valkey }
  ports:
    - port: 6379
      targetPort: 6379
